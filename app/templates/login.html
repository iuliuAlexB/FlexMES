<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FlexMES — Autentificare</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">
<div class="card shadow" style="width:100%; max-width:400px;">
    <div class="card-header bg-dark text-white text-center py-3">
        <h4 class="mb-0">🏭 FlexMES</h4>
        <small class="text-white-50">Manufacturing Execution System</small>
    </div>
    <div class="card-body p-4">
        {% for msg in flash_messages %}
        <div class="alert alert-{{ msg.category }} py-2">{{ msg.message }}</div>
        {% endfor %}

        <form method="post" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nume utilizator</label>
                <input type="text" name="username" class="form-control" autofocus required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Parolă</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Conectare</button>
        </form>

        <hr class="my-3">
        <p class="text-muted small mb-1 fw-semibold">Credențiale demo:</p>
        <div class="d-flex gap-2">
            <span class="badge bg-success">manager</span>
            <code class="small">admin / admin123</code>
        </div>
        <div class="d-flex gap-2 mt-1">
            <span class="badge bg-info">operator</span>
            <code class="small">operator1 / op123</code>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
