services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: flexmes
      POSTGRES_PASSWORD: flexmes
      POSTGRES_DB: flexmes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flexmes"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  web:
    build: ./app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://flexmes:flexmes@db:5432/flexmes
      SECRET_KEY: flexmes-secret-key-minimum-32-chars-change-in-prod
      CSRF_SECRET: flexmes-csrf-secret-change-in-prod
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC_PREFIX: flexmes
      DEBUG: "false"
    volumes:
      - ./app:/app

  simulator:
    build: ./simulator
    depends_on:
      - mosquitto
      - web
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC_PREFIX: flexmes
      WEB_URL: http://web:8000
    restart: on-failure

volumes:
  postgres_data: